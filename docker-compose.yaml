services:
  latest:
    build:
      args:
        PHP_VERSION: ""
    tty: true
    volumes:
      - .:/app/:delegated
  php82:
    build:
      args:
        PHP_VERSION: "8.2-"
    extends:
      service: latest
  php83:
    build:
      args:
        PHP_VERSION: "8.3-"
    extends:
      service: latest
  php84:
    build:
      args:
        PHP_VERSION: "8.4-"
    extends:
      service: latest
