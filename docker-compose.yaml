services:
  latest:
    build:
      args:
        PHP_VERSION: ""
    tty: true
    # Run as the host user so files written to the mounted volume (vendor, reports, test
    # scratchpad, caches) are not owned by root on the host.
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      HOME: /tmp
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      # Xdebug slows everything down; the composer test scripts enable it when needed.
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
    volumes:
      - .:/app/:delegated
  php82:
    build:
      args:
        PHP_VERSION: "8.2-"
    extends:
      service: latest
  php83:
    build:
      args:
        PHP_VERSION: "8.3-"
    extends:
      service: latest
  php84:
    build:
      args:
        PHP_VERSION: "8.4-"
    extends:
      service: latest
  php85:
    build:
      args:
        PHP_VERSION: "8.5-"
    extends:
      service: latest
